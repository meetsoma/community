name: Main Branch Guard

# SX-472: runs privacy + injection + frontmatter scans on every push to main.
# Redundant with pr-review.yml — intentional. Fallback for when pre-push hooks
# drift (they did Mar 18 → Apr 18 and allowed a real leak through).
#
# If pr-review passes but main-guard fails, something bypassed the PR flow
# (force push, admin merge). Failing here is loud even if the hook failed silently.

on:
  push:
    branches: [main]
    paths:
      - 'protocols/**'
      - 'muscles/**'
      - 'skills/**'
      - 'scripts/**'
      - 'templates/**'
      - 'automations/**'
      - '.github/scripts/**'

permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Main Branch Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate frontmatter
        run: bash .github/scripts/validate-frontmatter.sh

      - name: Privacy scan
        run: bash .github/scripts/privacy-scan.sh

      - name: Injection scan
        run: bash .github/scripts/injection-scan.sh

      - name: Format compliance
        run: bash .github/scripts/format-check.sh

  # Open an issue if scans fail — loud signal, can't be ignored
  alert-on-failure:
    name: Alert on Failure
    needs: scan
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Main branch scan FAILED on ${context.sha.slice(0,7)}`;
            const body = `Main branch push by \`${context.actor}\` failed safety scans.
            
            **Commit:** ${context.sha}
            **Message:** ${context.payload.head_commit?.message || '(unknown)'}
            **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            
            This is the **last line of defense** — it means a PR got merged (or a
            force-push landed) with content that would have been blocked at PR time.
            
            **Action required:** investigate, revert or patch, verify pre-push hooks
            on contributor machines are live (\`soma-repos.sh hooks\` from the
            meetsoma agent ecosystem).`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'main-branch-guard']
            });
