name: Build Hub Index

on:
  push:
    branches: [main]
    paths:
      - 'protocols/**'
      - 'muscles/**'
      - 'skills/**'
      - 'scripts/**'
      - 'templates/**'
      - 'automations/**'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build hub-index.json
        run: node scripts/build-hub-index.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "meetsoma[bot]"
          git config user.email "meetsoma[bot]@users.noreply.github.com"
          git add hub-index.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: rebuild hub-index.json [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Deploy hook removed — hub pages are now dynamic (HubDetail.tsx fetches
      # from GitHub raw at runtime). No website rebuild needed for new content.
