name: Build Hub Index

on:
  push:
    branches: [main]
    paths:
      - 'protocols/**'
      - 'muscles/**'
      - 'skills/**'
      - 'scripts/**'
      - 'templates/**'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build hub-index.json
        run: node scripts/build-hub-index.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "meetsoma[bot]"
          git config user.email "meetsoma[bot]@users.noreply.github.com"
          git add hub-index.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: rebuild hub-index.json [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger website rebuild
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -s -X POST "$VERCEL_DEPLOY_HOOK" && echo "✅ Deploy hook triggered"
